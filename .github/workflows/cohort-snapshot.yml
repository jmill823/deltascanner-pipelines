name: Monthly Cohort Snapshot

on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Run cohort snapshot
        run: python scripts/maintenance/cohort_snapshot.py
        continue-on-error: true

      - name: Send notification
        if: always()
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          DATE=$(date +%Y-%m-%d)
          DIFF="data/diff/cohort_diff_${DATE}.json"
          if [ -f "$DIFF" ]; then
            python scripts/maintenance/send_cohort_email.py "$DIFF"
          else
            echo "No diff found for $DATE"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cohort-snapshot
          path: |
            data/diff/cohort_diff_*.json
            data/scored/*_snapshot_*.csv
