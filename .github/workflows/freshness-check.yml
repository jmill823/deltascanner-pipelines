name: Monthly Freshness Check

on:
  schedule:
    - cron: '0 8 15 * *'
  workflow_dispatch:

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Run freshness check
        run: python scripts/maintenance/freshness_check.py
        continue-on-error: true

      - name: Send notification
        if: always()
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          DATE=$(date +%Y-%m-%d)
          REPORT="data/freshness_report_${DATE}.json"
          if [ -f "$REPORT" ]; then
            python scripts/maintenance/send_freshness_email.py "$REPORT"
          else
            echo "No report found for $DATE"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: freshness-report
          path: data/freshness_report_*.json
